<footer class="terminal-bar">
  <!-- Help overlay -->
  @if (terminalCommandService.isHelpVisible()) {
    <div class="help-overlay">
      <div class="help-content">
        <div class="help-header">
          <span class="help-title">Available Commands</span>
          <button class="help-close" (click)="toggleHelp()" aria-label="Close help">×</button>
        </div>
        <div class="help-list">
          @for (cmd of terminalCommandService.availableCommands; track cmd.name) {
            <button class="help-item" (click)="executeCommand(cmd.name)">
              <code class="help-command">{{ cmd.name }}</code>
              <span class="help-description">{{ cmd.description }}</span>
            </button>
          }
        </div>
      </div>
    </div>
  }

  <!-- Feedback area -->
  @if (terminalCommandService.lastFeedback()) {
    <div class="feedback">
      <span class="feedback-text">{{ terminalCommandService.lastFeedback() }}</span>
    </div>
  }

  <!-- Command input -->
  <div class="input-area">
    <span class="prompt-text">OPERATOR@ARCHIVE:~$</span>
    <input
      type="text"
      [value]="inputValue"
      (input)="inputValue = $event.target.value"
      (keydown)="onKeyDown($event)"
      class="command-input"
      placeholder="Type 'help' for commands"
      aria-label="Terminal command input"
    />
    <span class="material-symbols-outlined prompt-cursor blink">_</span>
    <button class="help-btn" (click)="toggleHelp()" aria-label="Show help">
      <span class="material-symbols-outlined text-sm">help_outline</span>
    </button>
  </div>
</footer>
