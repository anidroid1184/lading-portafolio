<section id="tech" class="section-shell pb-12 md:pb-16">
  <h2 class="section-title">The Multiverse Stack</h2>
  <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (item of stack; track item.title) {
      <article class="comic-card p-4 glitch-hover stack-card">
        <p class="stack-layer">{{ item.layer }}</p>
        <h3 class="font-bold text-xl mt-1 text-sky-300">{{ item.title }}</h3>
        <p class="text-sm text-slate-200 mt-2">{{ item.subtitle }}</p>

        <a class="stack-github" [href]="item.repoUrl" target="_blank" rel="noopener noreferrer" aria-label="Ver repositorio en GitHub">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2C6.48 2 2 6.58 2 12.22c0 4.5 2.87 8.32 6.84 9.67.5.1.68-.22.68-.49 0-.24-.01-1.03-.02-1.86-2.78.62-3.37-1.2-3.37-1.2-.45-1.19-1.11-1.5-1.11-1.5-.91-.63.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.33 1.11 2.9.85.09-.67.35-1.11.63-1.36-2.22-.26-4.55-1.14-4.55-5.09 0-1.13.39-2.05 1.03-2.78-.1-.26-.45-1.31.1-2.72 0 0 .84-.28 2.75 1.06A9.27 9.27 0 0 1 12 6.87c.85 0 1.72.12 2.53.35 1.91-1.34 2.75-1.06 2.75-1.06.55 1.41.2 2.46.1 2.72.64.73 1.03 1.65 1.03 2.78 0 3.96-2.33 4.82-4.56 5.08.36.32.68.95.68 1.92 0 1.39-.01 2.5-.01 2.84 0 .27.18.6.69.49A10.2 10.2 0 0 0 22 12.22C22 6.58 17.52 2 12 2Z"/>
          </svg>
          <span>Repo</span>
        </a>
      </article>
    }
  </div>
</section>
